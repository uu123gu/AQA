<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 让页面完美适配手机屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>写小说模拟器</title>
    <style>
        /* 基础重置与黑白极简风格设置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #ffffff; /* 纯白背景 */
            color: #000000; /* 纯黑文字 */
            line-height: 1.6;
        }

        /* 主容器，限制最大宽度以在电脑上也好看，手机上则是全宽 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部导航栏布局 */
        header {
            display: flex;
            justify-content: space-between; /* 日期靠左，按钮靠右 */
            align-items: center;
            border-bottom: 2px solid #000000; /* 黑色底边框 */
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        /* 日期文本样式 */
        #date-display {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 下一周按钮样式 */
        .btn-next-week {
            background-color: #000000; /* 黑色按钮 */
            color: #ffffff; /* 白色文字 */
            border: none;
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-next-week:active {
            background-color: #333333; /* 点击时的反馈效果 */
        }

        /* 个人资料标题 */
        .profile-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 数值分类区块 */
        .stat-section {
            margin-bottom: 30px;
        }

        .stat-section-title {
            font-size: 1.2rem;
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        /* 单个数值项的布局 */
        .stat-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        /* 数值名称（例如：饱腹、外貌） */
        .stat-name {
            width: 60px; /* 固定宽度让进度条对齐 */
            font-size: 0.95rem;
            font-weight: bold;
        }

        /* 进度条外框 */
        .progress-bar {
            flex-grow: 1; /* 占据剩余空间 */
            height: 12px;
            border: 1px solid #000000; /* 黑色边框 */
            margin: 0 15px;
            border-radius: 2px;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* 进度条内部填充 */
        .progress-fill {
            height: 100%;
            background-color: #000000; /* 黑色填充 */
            width: 100%; /* 默认满值，由JS控制宽度 */
            transition: width 0.3s ease-in-out; /* 动画效果 */
        }

        /* 具体数字显示（例如：200/200） */
        .stat-value {
            width: 70px;
            text-align: right;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部：日期与下一周按钮 -->
    <header>
        <div id="date-display">2026年1月1日</div>
        <button class="btn-next-week" onclick="nextWeek()">下一周</button>
    </header>

    <!-- 主体：个人资料 -->
    <main>
        <div class="profile-title">个人资料</div>

        <!-- 第一类数值（生存类） -->
        <div class="stat-section">
            <div class="stat-section-title">生活状态</div>
            <div id="stats-group-1">
                <!-- 这里的HTML将由JavaScript动态生成，方便后续增删 -->
            </div>
        </div>

        <!-- 第二类数值（属性类） -->
        <div class="stat-section">
            <div class="stat-section-title">人物属性</div>
            <div id="stats-group-2">
                <!-- 这里的HTML将由JavaScript动态生成 -->
            </div>
        </div>
    </main>
</div>

<script>
    // --- 初始数据配置 ---

    // 设置初始日期 (JavaScript中月份0代表1月)
    let currentDate = new Date(2026, 0, 1); 

    // 第一类数值配置 (上限 200)
    // 初始值我这里设定为满值200，您可以修改 value 的值来改变开局属性
    let stats1 = [
        { id: 'fullness', name: '饱腹', value: 200, max: 200 },
        { id: 'water', name: '水分', value: 200, max: 200 },
        { id: 'toilet', name: '便意', value: 200, max: 200 },
        { id: 'clean', name: '干净', value: 200, max: 200 },
        { id: 'stress', name: '压力', value: 200, max: 200 },
        { id: 'health', name: '健康', value: 200, max: 200 }
    ];

    // 第二类数值配置 (上限 500)
    // 初始值我暂定为 100，您可以自由调整
    let stats2 = [
        { id: 'appearance', name: '外貌', value: 100, max: 500 },
        { id: 'intelligence', name: '智力', value: 100, max: 500 },
        { id: 'eq', name: '情商', value: 100, max: 500 },
        { id: 'voice', name: '声音', value: 100, max: 500 },
        { id: 'acting', name: '演技', value: 100, max: 500 },
        { id: 'fans', name: '粉丝', value: 0, max: 500 }
    ];

    // --- 界面渲染函数 ---

    // 格式化日期显示 (例如：2026年1月1日)
    function renderDate() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1; // 月份需要加1
        const day = currentDate.getDate();
        document.getElementById('date-display').innerText = `${year}年${month}月${day}日`;
    }

    // 生成并更新数值UI界面的函数
    function renderStats() {
        // 渲染第一类数值
        const group1Container = document.getElementById('stats-group-1');
        group1Container.innerHTML = ''; // 清空旧内容
        stats1.forEach(stat => {
            const percentage = (stat.value / stat.max) * 100;
            group1Container.innerHTML += `
                <div class="stat-item">
                    <div class="stat-name">${stat.name}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="stat-value">${stat.value} / ${stat.max}</div>
                </div>
            `;
        });

        // 渲染第二类数值
        const group2Container = document.getElementById('stats-group-2');
        group2Container.innerHTML = ''; // 清空旧内容
        stats2.forEach(stat => {
            const percentage = (stat.value / stat.max) * 100;
            group2Container.innerHTML += `
                <div class="stat-item">
                    <div class="stat-name">${stat.name}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="stat-value">${stat.value} / ${stat.max}</div>
                </div>
            `;
        });
    }

    // --- 游戏核心逻辑 ---

    // 点击“下一周”触发的函数
    function nextWeek() {
        // 1. 日期增加 7 天
        currentDate.setDate(currentDate.getDate() + 7);

        // 2. 扣除第一类数值 5 点
        stats1.forEach(stat => {
            stat.value -= 5;
            // 确保数值不会变成负数
            if (stat.value < 0) {
                stat.value = 0;
            }
        });

        // 可以在这里补充您的第二类数值变化逻辑
        // 例如：增加粉丝等...

        // 3. 重新渲染界面
        renderDate();
        renderStats();
    }

    // --- 初始化执行 ---
    // 页面加载时执行一次渲染
    renderDate();
    renderStats();

</script>
</body>
</html>
